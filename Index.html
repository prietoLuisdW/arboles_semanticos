<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuaderno Sintáctico Interactivo</title>
    <!-- Importación de fuentes: Inter para la estructura, Caveat para estilo escritura a mano -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        hand: ['Caveat', 'cursive']
                    }, 
                    colors: { 
                        corporate: { primary: '#001391', secondary: '#85C8FF', dark: '#070E46', sand: '#F7F8F8' }
                    } 
                } 
            } 
        }
    </script>
    <style>
        body { background-color: #e2e8f0; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        /* Diseño del Cuaderno */
        .notebook-page {
            background-color: #fefefe;
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 2.5rem; /* Espaciado de los renglones */
            box-shadow: -10px 0px 20px rgba(0,0,0,0.05), 10px 10px 30px rgba(0,0,0,0.1);
        }
        .notebook-margin {
            position: absolute;
            top: 0; bottom: 0; left: 4.5rem;
            width: 2px;
            background-color: #f87171; /* Margen rojo */
            opacity: 0.6;
            z-index: 0;
        }

        /* Lógica CSS para el Árbol Sintáctico (Mantenida y Optimizada) */
        .tree ul {
            padding-top: var(--ul-pt, 32px); 
            position: relative;
            transition: all 0.5s; 
            display: flex; 
            justify-content: center;
        }
        .tree li {
            position: relative; 
            padding: var(--pt, 32px) 4px 0 4px; 
            text-align: center;
            list-style-type: none;
        }
        .tree li::before, .tree li::after {
            content: ''; position: absolute; top: 0; right: 50%;
            border-top: 2px solid #94a3b8; 
            width: 50%; height: var(--pt, 32px);
        }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid #94a3b8; }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid #94a3b8; border-radius: 0 6px 0 0; }
        .tree li:first-child::after { border-radius: 6px 0 0 0; }
        .tree ul::before {
            content: ''; position: absolute; top: 0; left: 50%;
            border-left: 2px solid #94a3b8;
            width: 0; height: var(--ul-pt, 32px);
            margin-left: -1px;
        }
        .tree > ul > li::before, .tree > ul > li::after, .tree > ul::before { display: none; }

        /* Estilos de los Nodos */
        .node {
            height: 38px; display: inline-flex; align-items: center; justify-content: center;
            padding: 0 14px; border-radius: 6px; font-size: 12px; font-weight: 700;
            letter-spacing: 0.5px; min-width: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 2px solid rgba(255,255,255,0.7);
            position: relative; z-index: 10; font-family: 'Inter', sans-serif;
        }
        .node-word { min-height: 38px; height: auto; padding: 6px 14px; font-size: 13px; }

        /* Pestañas (Botones) */
        .tab-btn { transition: all 0.2s ease; }
        .tab-btn.active { background-color: #001391; color: white; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,19,145,0.3); }
        .tab-btn:not(.active):hover { background-color: #e2e8f0; }
    </style>
</head>

        // Paleta de colores jerárquica para los nodos
        const nodeColors = [
            'bg-orange-500 text-white border-orange-300',         // 0: Nivel Raíz (O)
            'bg-amber-400 text-amber-900 border-amber-200',       // 1: P1, NX, P2
            'bg-lime-400 text-lime-900 border-lime-200',          // 2: SN, SV/PV
            'bg-cyan-400 text-cyan-900 border-cyan-200',          // 3: N, CD, CI...
            'bg-emerald-300 text-emerald-900 border-emerald-100', // 4: VERBO, PRON...
        ];
        const wordColor = 'bg-fuchsia-500 text-white border-fuchsia-300'; // Final

        // Función recursiva para dibujar HTML del árbol
        function renderTree(node, depth = 0) {
            // Si es la palabra final
            if (node.isWord) {
                return `<li style="${node.pt ? '--pt: ' + node.pt : ''}">
                    <div class="node node-word ${wordColor}">${node.label}</div>
                </li>`;
            }

            // Seleccionar color basado en profundidad u override manual
            let nodeDepth = node.overrideDepth !== undefined ? node.overrideDepth : depth;
            let colorClass = nodeColors[nodeDepth] || nodeColors[nodeColors.length - 1];

            // Renderizar hijos
            let childrenHtml = '';
            if (node.children) {
                let ulStyle = node.ulPt ? `style="--ul-pt: ${node.ulPt}"` : '';
                childrenHtml = `<ul ${ulStyle}>${node.children.map(c => renderTree(c, depth + 1)).join('')}</ul>`;
            }

            return `<li style="${node.pt ? '--pt: ' + node.pt : ''}">
                <div class="node ${colorClass}">${node.label}</div>
                ${childrenHtml}
            </li>`;
        }

        // Sistema de navegación
        function selectTree(index) {
            const data = treesData[index];
            
            // Actualizar textos
            document.getElementById('sentence-display').innerHTML = `"${data.sentence}"`;
            document.getElementById('legend-display').innerText = data.legend;
            
            // Renderizar árbol correspondiente
            const treeHtml = `<ul>${renderTree(data.root, 0)}</ul>`;
            document.getElementById('tree-container').innerHTML = treeHtml;

            // Actualizar estado visual de los botones
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                if (i === index) {
                    btn.classList.add('active', 'font-bold');
                    btn.classList.remove('text-gray-500');
                } else {
                    btn.classList.remove('active', 'font-bold');
                    btn.classList.add('text-gray-500');
                }
            });
        }

        // Inicializar interfaz
        function initApp() {
            const tabsContainer = document.getElementById('tabs-container');
            
            treesData.forEach((tree, index) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn text-sm px-4 py-2 rounded-xl font-medium border border-transparent';
                btn.innerText = `Oración ${index + 1}`;
                btn.onclick = () => selectTree(index);
                tabsContainer.appendChild(btn);
            });

            // Seleccionar el primero por defecto
            selectTree(0);
        }

        // Ejecutar al cargar
        window.onload = initApp;
    </script>
</body>
</html>
